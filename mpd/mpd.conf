music_directory "/home/harunato/Music"
playlist_directory "/home/harunato/Music/.playlists"
# create .mpdignore in playlist_directory to exluce a subdirectory

bind_to_address "$XDG_RUNTIME_DIR/mpd/socket"

auto_update "yes"
restore_paused "yes"

db_file "/home/harunato/.cache/mpd/mpd.db"
log_file "/home/harunato/.cache/mpd/mpd.log"
pid_file "/home/harunato/.cache/mpd/mpd.pid"
state_file "/home/harunato/.cache/mpd/mpdstate"

audio_output {
    type "pipewire"
    name "PipeWire Sound Server"
}


# visualization
audio_output {
    type "fifo"
    name "Visulaizer feed"
    path "/tmp/mpd.fifo"
    format "44100:16:2"
}

decoder {
    plugin "wildmidi"
    enabled "no"
}
